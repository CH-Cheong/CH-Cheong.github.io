<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CH Cheong | Research Lab</title>
  <style>
    :root{--bg:#0b0f14;--text:#e8eef6;--muted:#9fb0c4;--line:#1b2a3a}
    *{box-sizing:border-box}
    body{
      margin:0; height:100vh; display:grid; place-items:center;
      background:var(--bg); color:var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Noto Sans KR", monospace;
    }
    a{color:inherit;text-decoration:none}
    .wrap{width:min(880px, 92vw); padding:28px}
    .frame{
      border:1px solid var(--line); border-radius:16px;
      padding:26px 22px; background:rgba(255,255,255,.02);
    }
    .top{display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap}
    .name{font-size:18px; font-weight:800; letter-spacing:.2px}
    .meta{color:var(--muted); font-size:12px}
    .line{height:1px; background:var(--line); margin:18px 0}
    .msg{color:var(--muted); font-size:13px; line-height:1.7}
    .btn{
      display:inline-flex; align-items:center; gap:10px;
      margin-top:16px; padding:10px 12px; border-radius:12px;
      border:1px solid var(--line); color:var(--text);
      background:rgba(255,255,255,.03);
    }
    .btn:hover{background:rgba(255,255,255,.06)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="frame">
      <div class="top">
        <div class="name">Research Lab</div>
        <div class="meta">In Construction</div>
      </div>

      <div class="line"></div>

      <div class="msg">
        This page is under construction.<br/>
        I will publish reproducible experiments, datasets, and tools here.
      </div>

      <a class="btn" href="index.html">← Back to Cover</a>
    </div>
  </div>
</body>
</html>
