<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CH Cheong | Lecture</title>
  <style>
    :root{--bg:#0b0f14;--text:#e8eef6;--muted:#9fb0c4;--line:#1b2a3a}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Noto Sans KR", monospace;}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:980px;margin:0 auto;padding:34px 18px 70px}
    header{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:flex-end}
    .h1{font-size:20px;font-weight:800}
    .sub{color:var(--muted);font-size:12px;line-height:1.6}
    .nav{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:1px solid var(--line);background:rgba(255,255,255,.03);padding:8px 10px;border-radius:12px;font-size:12px}
    .btn:hover{background:rgba(255,255,255,.06)}
    .board{margin-top:14px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:rgba(255,255,255,.02)}
    .row{
      display:grid;
      grid-template-columns: 110px 1fr 90px;
      gap:12px;
      padding:12px 14px;
      border-top:1px solid var(--line);
      align-items:center;
    }
    .row:first-child{border-top:none}
    .date{color:var(--muted);font-size:12px}
    .title{font-size:13px;font-weight:700;line-height:1.4}
    .meta{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.4}
    .tag{
      justify-self:end;
      color:var(--muted);
      font-size:11px;
      border:1px solid var(--line);
      padding:3px 8px;
      border-radius:999px;
      background:rgba(0,0,0,.10);
    }
    .row:hover{background:rgba(255,255,255,.03)}
    .hint{margin-top:10px;color:var(--muted);font-size:12px}
    footer{margin-top:18px;color:var(--muted);font-size:11px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
    @media (max-width:760px){
      .row{grid-template-columns: 1fr; gap:6px}
      .tag{justify-self:start}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="h1">Lecture / Board</div>
        <div class="sub">형이 항목만 추가하면 자동으로 게시판처럼 쌓이는 구조</div>
      </div>
      <div class="nav">
        <a class="btn" href="index.html">Cover</a>
        <a class="btn" href="home.html">Home</a>
        <a class="btn" href="trends.html">Trends</a>
        <a class="btn" href="projects.html">Projects</a>
      </div>
    </header>

    <div class="board">

      <!-- ✅ 아래 “row 블록”만 복붙해서 계속 추가하면 됨 -->

      <a class="row" href="https://YOUR_LINK_HERE" target="_blank" rel="noopener">
        <div class="date">2026-02-26</div>
        <div>
          <div class="title">건축설비 / 6강 — HVAC & Heating</div>
          <div class="meta">키워드: 난방 방식, 라디에이터, 증기/온수 시스템</div>
        </div>
        <div class="tag">audio</div>
      </a>

      <a class="row" href="https://YOUR_LINK_HERE" target="_blank" rel="noopener">
        <div class="date">2026-02-24</div>
        <div>
          <div class="title">AI 연구방법론 — LLM 활용 주의사항</div>
          <div class="meta">키워드: 환각, 레퍼런스 검증, 재현성</div>
        </div>
        <div class="tag">note</div>
      </a>

      <!-- ✅ row 끝 -->

    </div>

    <div class="hint">
      추가 방법: 위 <b>row</b> 한 덩어리 복사 → 날짜/제목/키워드/링크만 바꾸기 → Commit
    </div>

    <footer>
      <div>© CH-Cheong</div>
      <div>Text-first · Simple ops</div>
    </footer>
  </div>
</body>
</html>
