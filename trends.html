<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CH Cheong | Trends</title>
  <style>
    :root{--bg:#0b0f14;--text:#e8eef6;--muted:#9fb0c4;--line:#1b2a3a}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Noto Sans KR", monospace;}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:980px;margin:0 auto;padding:34px 18px 70px}
    header{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:flex-end}
    .h1{font-size:20px;font-weight:800}
    .sub{color:var(--muted);font-size:12px;line-height:1.6}
    .nav{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:1px solid var(--line);background:rgba(255,255,255,.03);padding:8px 10px;border-radius:12px;font-size:12px}
    .btn:hover{background:rgba(255,255,255,.06)}
    .card{border:1px solid var(--line);background:rgba(255,255,255,.02);border-radius:16px;padding:16px;margin-top:14px}
    h2{margin:0 0 10px;font-size:14px}
    .muted{color:var(--muted);font-size:12px;line-height:1.7}
    .item{border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:10px;background:rgba(0,0,0,.10)}
    .it{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .tag{color:var(--muted);font-size:11px;border:1px solid var(--line);padding:2px 8px;border-radius:999px}
    .one{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.7}
    footer{margin-top:18px;color:var(--muted);font-size:11px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="h1">Trends / Research Notes</div>
        <div class="sub">.</div>
      </div>
      <div class="nav">
        <a class="btn" href="index.html">Cover</a>
        <a class="btn" href="home.html">Home</a>
        <a class="btn" href="lecture.html">Lecture</a>
        <a class="btn" href="projects.html">Projects</a>
      </div>
    </header>

    <section class="card">
      <h2>Research Trends</h2>
      <div id="trends-content"></div>

      <h2 style="margin-top:20px;">Publications</h2>
      <div id="papers-content"></div>
    </section>

    <footer>
      <div>© CH-Cheong</div>
      <div>Short notes · High signal</div>
    </footer>
  </div>

  <script>
  async function loadTrends(url, targetId) {
    const res = await fetch(url, { cache: "no-store" });
    const text = await res.text();
    const lines = text.split("\n").map(s => s.trim()).filter(Boolean);

    const root = document.getElementById(targetId);
    root.innerHTML = "";

    let currentItem = null; // 마지막으로 만든 박스(item)
    let currentList = null; // currentItem 안의 ul

    function ensureList() {
      if (!currentItem) return null;
      if (!currentList) {
        currentList = document.createElement("ul");
        currentList.style.margin = "8px 0 0 18px";
        currentList.style.padding = "0";
        currentList.style.color = "var(--muted)";
        currentList.style.fontSize = "12px";
        currentList.style.lineHeight = "1.7";
        currentItem.appendChild(currentList);
      }
      return currentList;
    }

    lines.forEach(line => {
      // 하위항목: "- " 로 시작 → 박스 만들지 않고 ul/li로 추가
      if (line.startsWith("- ")) {
        const ul = ensureList();
        if (!ul) return;
        const li = document.createElement("li");
        li.textContent = line.slice(2).trim();
        ul.appendChild(li);
        return;
      }

      // 상위항목: 박스 생성
      currentItem = document.createElement("div");
      currentItem.className = "item";
      currentItem.innerHTML = `
        <div class="it">
          <div>${line}</div>
          <span class="tag">trend</span>
        </div>
      `;
      root.appendChild(currentItem);

      // 새 박스가 생기면 리스트 컨텍스트 초기화
      currentList = null;
    });
  }

  async function loadPapers(url, targetId) {
    const res = await fetch(url, { cache: "no-store" });
    const text = await res.text();
    const lines = text.split("\n").map(s => s.trim()).filter(Boolean);

    const root = document.getElementById(targetId);
    root.innerHTML = "";

    const isNumberLine = (s) => {
      // "1. ..." "12. ..."
      if (/^\d+\.\s+/.test(s)) return true;
      // "01 ..." "1 ..." (숫자 + 공백)
      if (/^\d+\s+/.test(s)) return true;
      return false;
    };

    let list = null;
    function startListIfNeeded() {
      if (list) return;
      list = document.createElement("ol");
      list.style.margin = "6px 0 0 18px";
      list.style.padding = "0";
      list.style.color = "var(--muted)";
      list.style.fontSize = "12px";
      list.style.lineHeight = "1.7";
      root.appendChild(list);
    }
    function endList() {
      list = null;
    }

    lines.forEach(line => {
      if (isNumberLine(line)) {
        startListIfNeeded();
        const li = document.createElement("li");
        li.textContent = line;
        list.appendChild(li);
        return;
      }

      // 숫자 리스트 구간 종료
      endList();

      // 일반 줄은 박스 생성
      const item = document.createElement("div");
      item.className = "item";
      item.innerHTML = `
        <div class="it">
          <div>${line}</div>
          <span class="tag">paper</span>
        </div>
      `;
      root.appendChild(item);
    });
  }

  loadTrends("/data/trends.txt", "trends-content");
  loadPapers("/data/papers.txt", "papers-content");
  </script>
</body>
</html>
