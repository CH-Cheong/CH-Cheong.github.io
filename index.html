<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CH Cheong</title>
  <meta name="description" content="AI-driven Sustainable Building Environment Research." />
  <style>
    :root{--bg:#0b0f14;--text:#e8eef6;--muted:#9fb0c4;--line:#1b2a3a}
    *{box-sizing:border-box}
    body{
      margin:0; height:100vh; display:grid; place-items:center;
      background:var(--bg); color:var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Noto Sans KR", monospace;
    }
    .wrap{width:min(880px, 92vw); padding:28px}
    .frame{
      border:1px solid var(--line); border-radius:16px;
      padding:26px 22px; background:rgba(255,255,255,.02);
    }
    .top{display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap}
    .name{font-size:20px; font-weight:800; letter-spacing:.2px}
    .meta{color:var(--muted); font-size:12px}
    .line{height:1px; background:var(--line); margin:18px 0}
    .tag{color:var(--muted); font-size:13px; line-height:1.7}
    .tag b{color:var(--text); font-weight:700}
    .enter{
      display:inline-flex; align-items:center; gap:10px;
      margin-top:18px; padding:10px 12px; border-radius:12px;
      border:1px solid var(--line); color:var(--text); text-decoration:none;
      background:rgba(255,255,255,.03);
    }
    .enter:hover{background:rgba(255,255,255,.06)}
    .secondary{
      display:inline-flex; align-items:center;
      margin-top:10px; padding:8px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      font-size:12px;
      color:var(--muted);
      text-decoration:none;
      background:rgba(255,255,255,.02);
    }
    .secondary:hover{background:rgba(255,255,255,.05)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="frame">
      <div class="top">
        <div class="name">CH Cheong</div>
        <div class="meta">Sustainable Building Environment × AI</div>
      </div>

      <div class="line"></div>

      <div class="tag">
        <b>Focus</b>: HVAC · IAQ · Thermal Comfort · Energy Modeling · LLM Evaluation<br/>
        <b>Mode</b>: audio-first lectures, trend notes, reproducible experiments
      </div>

      <a class="enter" href="home.html">
        → ENTER
      </a>

      <br/>

      <a class="secondary" href="lab.html">
        Research Lab (In Construction)
      </a>
      <br/>

     <a class="secondary" href="apps.html">
        Online Apps
      </a>
      
    </div>
  </div>
</body>
</html>
